services:
  - type: cron
    name: naukri-daily-update
    runtime: python
    schedule: "30 3 * * *"   # 9:00 AM IST = 3:30 AM UTC
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python naukri_automation.py
    envVars:
      - key: EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: NAUKRI_EMAIL
        sync: false
      - key: NAUKRI_PASSWORD
        sync: false